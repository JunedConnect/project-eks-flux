name: Docker Build & Push

on:
  workflow_dispatch:

jobs:
    docker-build:
        runs-on: ubuntu-24.04
        defaults:
            run:
                working-directory: "./app"
        permissions:
            security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
            id-token: write   # This is required for requesting the JWT

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to AWS
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
                role-session-name: github-actions-session
                aws-region: eu-west-2

            - name: Login to AWS ECR
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build
              run: |
                docker build -t weather-app .

            - name: Tagging image to ECR repository
              run: |
                docker tag weather-app ${{ secrets.ECR_REPOSITORY }}/weather-app:${{ github.sha }}
                docker tag weather-app ${{ secrets.ECR_REPOSITORY }}/weather-app:latest

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: weather-app
                severity: 'CRITICAL,HIGH'
                format: 'sarif'
                output: 'trivy-results-Docker.sarif'
                exit-code: 0
      
            - name: Upload Trivy scan results to GitHub Security tab
              uses: github/codeql-action/upload-sarif@v3
              with:
                sarif_file: 'trivy-results-Docker.sarif'
                wait-for-processing: true

            - name: Pushing docker image
              run: docker push ${{ secrets.ECR_REPOSITORY }}/weather-app --all-tags